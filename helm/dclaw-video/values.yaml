replicaCount: 2

image:
  backend:
    repository: dclaw-video-backend
    tag: latest
    pullPolicy: IfNotPresent
  frontend:
    repository: dclaw-video-frontend
    tag: latest
    pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8097
  targetPort: 8097

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: dclaw-video.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources: {}

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

env:
  DCLAW_REDIS_URL: "redis://redis:6379/0"
  DCLAW_COMFYUI_URL: "http://comfyui:8188"
  DCLAW_MINIO_ENDPOINT: "minio:9000"
  DCLAW_MINIO_ACCESS_KEY: "minioadmin"
  DCLAW_MINIO_SECRET_KEY: "minioadmin"
  DCLAW_DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/dclaw"
