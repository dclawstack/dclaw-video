version: "3.8"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8097:8097"
    environment:
      DCLAW_DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/dclaw
      DCLAW_REDIS_URL: redis://redis:6379/0
      DCLAW_MINIO_ENDPOINT: minio:9000
      DCLAW_COMFYUI_URL: http://comfyui:8188
    depends_on:
      - redis
      - minio
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3011:3011"
    depends_on:
      - backend

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dclaw
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Celery worker for GPU tasks — run on GPU host or replace with cloud worker
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.core.celery_app worker -l info -Q dclaw
    environment:
      DCLAW_DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/dclaw
      DCLAW_REDIS_URL: redis://redis:6379/0
      DCLAW_MINIO_ENDPOINT: minio:9000
      DCLAW_COMFYUI_URL: http://comfyui:8188
    depends_on:
      - redis
      - db
      - minio

volumes:
  redis_data:
  minio_data:
  postgres_data:
