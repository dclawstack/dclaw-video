name: Build Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check app
      - name: Type check
        run: mypy app
      - name: Test
        run: pytest --asyncio-mode=auto
      - name: Build Docker image
        run: docker build -t dclaw-video-backend:${{ github.sha }} .
